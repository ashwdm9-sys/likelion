<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Toggle Example</title>
  <style>
    /* 토글할 대상의 기본 스타일 */
    #contentBox {
      background-color: #f2f2f2;
      padding: 20px;
      margin: 10px 0;
    }
    
    /* 숨기기 예시: display: none 적용 */
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <button id="toggleBtn">Show/Hide Content</button>

  <div id="contentBox">
    <h2>Toggle Content</h2>
    <p>This is some content that can be toggled.</p>
  </div>

  <script src="fe_4_hw3.js"></script>
</body>
</html>
